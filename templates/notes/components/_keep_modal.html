<div class="keep-modal" id="keepModal">
    <div class="keep-modal-content" onclick="event.stopPropagation();">
    
        <!-- Image Slider Header -->
        <div id="modalImageSlider" class="modal-image-slider"></div>

        <input type="text" id="modalTitle" class="keep-modal-title" placeholder="Tiêu đề">

        <!-- Body: note thường -->
        <textarea id="modalContent" class="keep-modal-body" placeholder="Nội dung ghi chú..."></textarea>

        <!-- Body: checklist -->
        <div id="modalChecklist" style="display:none;">
            <div id="modalChecklistItems" class="modal-checklist-list"></div>
            <div class="modal-checklist-add" onclick="addModalChecklistItem()">
                <i class="ph ph-plus" style="font-size:1rem; margin-right:4px;"></i>
                <span>Thêm mục</span>
            </div>
        </div>

        <!-- Tags hiện tại -->
        <div id="modalTags" class="modal-tags-row"></div>

        <!-- Tag editor (ẩn mặc định) -->
        <div id="modalTagEditor" class="modal-tag-editor" style="display:none;">
            <div class="tag-editor-search-row">
                <input type="text" id="tagSearchInput" class="tag-search-input"
                       placeholder="Tìm hoặc tạo danh mục…"
                       oninput="filterCategories(this.value)">
            </div>
            <div id="tagCategoryList" class="tag-category-list"></div>
            <div id="tagNewRow" class="tag-new-row" style="display:none;"
                 onclick="createAndApplyCategory()">
                <i class="ph ph-plus" style="font-size:0.95rem;"></i>
                <span id="tagNewLabel">Tạo danh mục mới</span>
            </div>
        </div>

        <div class="keep-modal-footer">
            <div class="note-actions-left" style="position:relative;">
                <!-- Color picker -->
                <i class="ph ph-palette action-icon" style="font-size: 1.15rem;" title="Tùy chọn nền"
                   onclick="toggleCardColorPicker(this, event)"></i>
                <div class="color-picker-popup card-color-picker">
                    <div class="color-swatch swatch-none" data-color=""></div>
                    <div class="color-swatch" data-color="berry"></div>
                    <div class="color-swatch" data-color="red"></div>
                    <div class="color-swatch" data-color="orange"></div>
                    <div class="color-swatch" data-color="yellow"></div>
                    <div class="color-swatch" data-color="teal"></div>
                    <div class="color-swatch" data-color="blue"></div>
                    <div class="color-swatch" data-color="indigo"></div>
                    <div class="color-swatch" data-color="purple"></div>
                    <div class="color-swatch" data-color="pink"></div>
                    <div class="color-swatch" data-color="brown"></div>
                </div>

                <!-- Priority — picker nằm TRONG note-actions-left (position:relative) để absolute hoạt động đúng -->
                <i class="ph ph-flag action-icon" style="font-size: 1.15rem;" id="modalPriorityBtn"
                   title="Độ ưu tiên" onclick="toggleModalPriorityPicker(event)"></i>
                <div id="modalPriorityPicker" class="priority-picker-popup modal-priority-picker" style="display:none;">
                    <div class="priority-option" data-value="" onclick="applyModalPriority('')">
                        <i class="ph ph-minus-circle" style="color:var(--text-dim)"></i>
                        <span>Không có</span>
                    </div>
                    <div class="priority-option" data-value="high" onclick="applyModalPriority('high')">
                        <i class="ph ph-flag" style="color:#dc2626"></i>
                        <span>High</span>
                    </div>
                    <div class="priority-option" data-value="medium" onclick="applyModalPriority('medium')">
                        <i class="ph ph-flag" style="color:#b45309"></i>
                        <span>Medium</span>
                    </div>
                    <div class="priority-option" data-value="low" onclick="applyModalPriority('low')">
                        <i class="ph ph-flag" style="color:#16a34a"></i>
                        <span>Low</span>
                    </div>
                </div>

                <!-- Sửa nhãn -->
                <i class="ph ph-tag action-icon" style="font-size: 1.15rem;" id="modalTagBtn"
                   title="Sửa nhãn" onclick="toggleTagEditor()"></i>

                <!-- Toggle is_task -->
                <i class="ph ph-check-circle action-icon" style="font-size: 1.15rem;" id="modalTaskBtn"
                   title="Đánh dấu là nhiệm vụ" onclick="toggleModalTask()"></i>

                <!-- Thêm ảnh -->
                <input type="file" multiple id="modalImageInput" accept="image/*" style="display:none;" onchange="uploadModalImages(this)">
                <i class="ph ph-image action-icon" style="font-size: 1.15rem;" title="Thêm hình ảnh"
                   onclick="document.getElementById('modalImageInput').click()"></i>

                <i class="ph ph-bell action-icon" style="font-size: 1.15rem;" title="Nhắc nhở"
                   id="modalBellBtn" onclick="toggleSharedReminderPicker(event, this)"></i>

                <!-- Bảng chọn thời gian nhắc nhở (đã được chuyển ra base.html dùng chung) -->

                <i class="ph ph-archive action-icon" style="font-size: 1.15rem;" title="Lưu trữ"></i>
            </div>

            <div class="d-flex align-items-center gap-2">
                <i class="ph ph-trash action-icon" id="modalDeleteIcon"
                   title="Xóa ghi chú" style="font-size: 1.25rem; color:var(--danger);"
                   onclick="deleteNoteFromModal()"></i>
                <button class="btn-keep-close" onclick="closeKeepModal()">Đóng</button>
            </div>
        </div>

        <a id="modalDeleteBtn" href="#" style="display:none;"></a>
    </div>
</div>
