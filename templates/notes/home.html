{% extends 'base.html' %}

{% block content %}
<style>
    /* Khung tạo ghi chú Light Mode */
    .note-form-wrapper { max-width: 600px; margin: 0 auto 40px auto; background-color: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15); position: relative; }
    
    /* Trạng thái thu gọn */
    .note-collapsed { padding: 12px 16px; cursor: text; color: #5f6368; font-weight: 500; display: flex; align-items: center; justify-content: space-between;}
    
    /* Trạng thái mở rộng */
    .note-expanded { display: none; padding: 12px 16px; }
    .note-expanded input, .note-expanded textarea { background: transparent; border: none; color: #202124; width: 100%; outline: none; }
    .note-expanded input::placeholder, .note-expanded textarea::placeholder { color: #5f6368; }
    .note-expanded input { font-size: 1.1rem; font-weight: 500; margin-bottom: 10px; }
    .note-expanded textarea { font-size: 1rem; resize: none; min-height: 80px; }
    
    /* Thanh công cụ icon */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .toolbar-icons i { color: #5f6368; margin-right: 18px; cursor: pointer; padding: 8px; border-radius: 50%; font-size: 1.1rem; transition: 0.2s;}
    .toolbar-icons i:hover { background-color: rgba(60,64,67,0.08); color: #202124;}
    .btn-close-note { background: transparent; color: #202124; border: none; font-weight: 500; cursor: pointer; padding: 8px 24px; border-radius: 4px; transition: 0.2s;}
    .btn-close-note:hover { background-color: rgba(60,64,67,0.08); }
</style>

<div class="note-form-wrapper" id="formWrapper">
    <div class="note-collapsed" id="noteCollapsed" onclick="expandForm()">
        <span>Tạo ghi chú...</span>
        <div>
            <i class="fa-regular fa-square-check fs-5 me-3" title="Danh sách mới"></i>
            <i class="fa-solid fa-paintbrush fs-5 me-3" title="Ghi chú có bản vẽ mới"></i>
            <i class="fa-regular fa-image fs-5" title="Ghi chú mới có hình ảnh"></i>
        </div>
    </div>

    <form method="POST" action="{% url 'home' %}" class="note-expanded" id="noteExpanded">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Tiêu đề">
        <textarea name="content" placeholder="Tạo ghi chú..."></textarea>
        
        <div class="toolbar">
            <div class="toolbar-icons">
                <i class="fa-solid fa-palette" title="Tùy chọn nền"></i>
                <i class="fa-solid fa-image" title="Thêm hình ảnh"></i>
                <i class="fa-regular fa-bell" title="Nhắc nhở"></i>
                <i class="fa-solid fa-ellipsis-vertical" title="Thêm nhãn"></i>
            </div>
            <button type="submit" class="btn-close-note">Đóng</button>
        </div>
    </form>
</div>

<div class="row">
    <div class="col-md-3">
        <div class="card bg-white border rounded-3 mb-3 p-3 shadow-sm">
            <h5 class="fw-bold">Ghi chú demo</h5>
            <p class="mb-0 text-dark">Nội dung sẽ hiện ở đây...</p>
        </div>
    </div>
</div>

<script>
    function expandForm() {
        document.getElementById('noteCollapsed').style.display = 'none';
        document.getElementById('noteExpanded').style.display = 'block';
    }
</script>
{% endblock %}
