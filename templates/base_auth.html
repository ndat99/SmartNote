<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartNote{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f1f3f4; color: #202124; font-family: 'Roboto', Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .django-form input { width: 100%; padding: 0.375rem 0.75rem; border: 1px solid #ced4da; border-radius: 0.375rem; margin-bottom: 10px;}
        .django-form input:focus { border-color: #8ab4f8; outline: none; box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25); }
        .django-form label { font-weight: bold; margin-bottom: 0.5rem; display: block;}
        .django-form ul.errorlist { color: #dc3545; list-style: none; padding: 0; font-size: 0.875em;}
        .django-form span.helptext { font-size: 0.8em; color: #6c757d; display: block; margin-bottom: 15px;}
        a { text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
