{% extends "base_auth.html" %}
{% load socialaccount %}
{% block title %}Đăng ký - SmartNote{% endblock %}

{% block content %}
<div class="row justify-content-center w-100 m-0">
    <div class="col-12 col-sm-8 col-md-6 col-lg-5">
        <div class="card auth-card p-4 p-sm-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus text-success" style="font-size: 2.5rem;"></i>
                <h3 class="mt-3 fw-bold text-dark">Tạo tài khoản</h3>
                <p class="text-muted">Bắt đầu ghi chú với SmartNote</p>
            </div>

            <div class="d-grid mb-3">
                <a href="{% provider_login_url 'google' %}" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                    Đăng ký nhanh bằng Google
                </a>
            </div>

            <div class="divider">HOẶC TẠO MỚI TÀI KHOẢN</div>

            <form method="POST" action="{% url 'account_signup' %}">
                {% csrf_token %}
                <div class="django-form">
                    {{ form.as_p }}
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success btn-submit shadow-sm">Đăng Ký</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted">Đã có tài khoản?</span>
                <a href="{% url 'account_login' %}" class="fw-bold text-success ms-1">Đăng nhập</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
