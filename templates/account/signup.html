{% extends "base_auth.html" %}
{% load socialaccount %}
{% block title %}Đăng ký — SmartNote{% endblock %}

{% block content %}
<div class="row justify-content-center w-100 m-0" style="min-height:100vh; align-items:center;">
    <div class="col-12 col-sm-9 col-md-6 col-lg-4">
        <div class="card auth-card p-4 p-sm-5">

            <!-- Brand -->
            <div class="text-center mb-4">
                <div class="auth-brand mb-2">
                    <i class="fa-solid fa-user-plus" style="color: #52b788; font-size:1.5rem;"></i>
                    <span class="auth-brand-name">Smart<span class="auth-brand-dot">Note</span></span>
                </div>
                <p class="auth-subtitle">Tạo tài khoản miễn phí</p>
            </div>

            <!-- Google -->
            <div class="mb-3">
                <a href="{% provider_login_url 'google' %}" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                    Đăng ký nhanh bằng Google
                </a>
            </div>

            <div class="divider">hoặc tạo mới tài khoản</div>

            <!-- Form -->
            <form method="POST" action="{% url 'account_signup' %}">
                {% csrf_token %}
                <div class="django-form">
                    {{ form.as_p }}
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-success btn-submit">Tạo Tài Khoản</button>
                </div>
            </form>

            <div class="text-center mt-4 auth-footer-text">
                Đã có tài khoản?
                <a href="{% url 'account_login' %}" style="color: #52b788;">Đăng nhập</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
